name: Deploy to Local Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          cd /opt/docker-sites/latinamilesaway
          git pull origin main
          docker exec latinamilesaway_app bash -lc "cd /var/www && php artisan optimize:clear"
          npm run build
